version: "3"

networks:
  msaez:
    external: false
services:
  msaez:
    image: ghcr.io/msa-ez/platform:v1.0.29 # MSAez Docker Image
    networks:
      - msaez
    ports:
      - 8080:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      VUE_APP_DB_HOST: 127.0.0.1 # DB Host Name (VM 환경: VM IP로 변경 필요, 브라우저가 접근하는 주소와 동일하게 설정)
      VUE_APP_DB_PORT: 5757 # DB Port
      VUE_APP_DB_NAME: mydb # DB NAME
      VUE_APP_MODE: onprem # MODE onprem or dev
      VUE_APP_DB_HTTPS: "false" # MODE onprem or dev
      VUE_APP_GIT: gitea # Git Provider (Gitea or Gitlab or Github)
      VUE_APP_GIT_URL: http://localhost:3000 # Git Provider URL (VM 환경: VM IP로 변경 필요, 예: http://34.64.202.245:3000)
      VUE_APP_GITEA_TOKEN: "b1b75cd28593e93d38d73d0fa6eaf943e4aa4510" # Gitea Personal Access Token (optional, if not set, will use localStorage gitToken)
      VUE_APP_BACKEND_URL: http://localhost:2025 # Backend URL (VM 환경: VM IP로 변경 필요, 예: http://34.64.202.245:2025)
  backend-generators:
    image: ghcr.io/msa-ez/msaez-automate-project-generator:v1.0.0  # Backend Generators Docker Image (태그는 실제 버전으로 변경)
    container_name: backend-generators
    networks:
      - msaez
    ports:
      - "2025:2025"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ──────────────────────────────────────────────────────────────
      # LLM API Key 설정 (OpenAI SDK 표준 환경변수로 통일)
      # ──────────────────────────────────────────────────────────────
      # [기본: OpenAI 직접 호출]
      #   - OPENAI_API_KEY 만 설정하면 api.openai.com으로 호출됩니다.
      #   - OPENAI_BASE_URL 은 비워두거나 미설정.
      #
      # [P-GPT(POSCO 사내 LLM 게이트웨이) 사용 시]
      #   - OPENAI_BASE_URL 에 P-GPT 엔드포인트를 지정하면
      #     Chat/Responses/Models 호출이 P-GPT로 라우팅됩니다. (OpenAI 호환)
      #   - OPENAI_API_KEY 에 P-GPT에서 발급받은 API Key를 입력합니다.
      #   - P-GPT는 임베딩(Embedding)을 지원하지 않으므로,
      #     OPENAI_EMBEDDING_API_KEY 에 "실제 OpenAI API Key"를 반드시 별도 설정해야 합니다.
      #     (project backend에서 표준 변환 시 임베딩을 사용)
      #   - P-GPT 엔드포인트:
      #       개발계: http://taigpt.posco.net/gpgpta01-gpt/v1
      #       운영계: http://aigpt.posco.net/gpgpta01-gpt/v1
      # ──────────────────────────────────────────────────────────────
      OPENAI_API_KEY: your-openai-api-key-here              # OpenAI 직접 사용 시: OpenAI Key / P-GPT 사용 시: P-GPT Key
      # OPENAI_BASE_URL: http://aigpt.posco.net/gpgpta01-gpt/v1   # P-GPT 사용 시 주석 해제
      OPENAI_EMBEDDING_API_KEY: your-openai-api-key-here    # 임베딩용 실제 OpenAI Key (P-GPT 사용 시 필수)
      # OPENAI_EMBEDDING_BASE_URL: https://...              # (선택) 별도 임베딩 엔드포인트 사용 시
      # AceBase 설정
      ACEBASE_HOST: host.docker.internal  # 호스트의 AceBase 접근 (extra_hosts 필요, VM 환경: VM IP로 변경 가능)
      ACEBASE_PORT: 5757
      ACEBASE_DB_NAME: mydb
      ACEBASE_HTTPS: "false"
      ACEBASE_USERNAME: admin
      ACEBASE_PASSWORD: 75sdDSFg37w5
      # Flask 서버 설정
      FLASK_HOST: 0.0.0.0  # 모든 인터페이스에서 접근 가능
      FLASK_PORT: 2025
      # 기타 설정
      STORAGE_TYPE: acebase
      ENVIRONMENT: production
      IS_LOCAL_RUN: "true"  # Docker Compose 환경에서는 Kubernetes autoscaler 비활성화
      NAMESPACE: eventstorming_generator
      POD_ID: docker-pod
    restart: unless-stopped
  backend-es-generators:
    image: ghcr.io/msa-ez/msaez-automate-eventstorming-generator:v1.0.0  # Backend ES Generators Docker Image (태그는 실제 버전으로 변경)
    container_name: backend-es-generators
    networks:
      - msaez
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ──────────────────────────────────────────────────────────────
      # LLM API Key 설정 (OpenAI SDK 표준 환경변수로 통일)
      # ──────────────────────────────────────────────────────────────
      # [기본: OpenAI / Google AI 직접 호출]
      #   - OPENAI_API_KEY, GOOGLE_API_KEY 중 사용하는 모델에 맞춰 설정.
      #   - OPENAI_BASE_URL 은 비워두거나 미설정.
      #
      # [P-GPT(POSCO 사내 LLM 게이트웨이) 사용 시]
      #   - OPENAI_BASE_URL 에 P-GPT 엔드포인트를 지정하면
      #     Chat/Responses/Models 호출이 P-GPT로 라우팅됩니다. (OpenAI 호환)
      #   - OPENAI_API_KEY 에 P-GPT에서 발급받은 API Key를 입력합니다.
      #   - P-GPT 엔드포인트:
      #       개발계: http://taigpt.posco.net/gpgpta01-gpt/v1
      #       운영계: http://aigpt.posco.net/gpgpta01-gpt/v1
      #   - AI_MODEL / AI_MODEL_LIGHT 는 P-GPT에서 제공하는 모델명으로 변경 필요
      #     (예: openai:gpt-4o, openai:gpt-4o-mini → /v1/models 로 확인)
      # ──────────────────────────────────────────────────────────────
      GOOGLE_API_KEY: your-google-api-key-here
      OPENAI_API_KEY: your-open-api-key-here                # OpenAI 직접 사용 시: OpenAI Key / P-GPT 사용 시: P-GPT Key
      # OPENAI_BASE_URL: http://aigpt.posco.net/gpgpta01-gpt/v1   # P-GPT 사용 시 주석 해제
      # AI 모델 설정 (P-GPT 사용 시 P-GPT가 제공하는 모델명으로 변경)
      AI_MODEL: openai:gpt-4.1-2025-04-14
      AI_MODEL_MAX_INPUT_LIMIT: 523788
      AI_MODEL_MAX_BATCH_SIZE: 15
      AI_MODEL_LIGHT: openai:gpt-4.1-mini-2025-04-14
      AI_MODEL_LIGHT_MAX_INPUT_LIMIT: 523788
      AI_MODEL_LIGHT_MAX_BATCH_SIZE: 30
      # AceBase 설정
      ACEBASE_HOST: host.docker.internal  # 호스트의 AceBase 접근 (extra_hosts 필요, VM 환경: VM IP로 변경 가능)
      ACEBASE_PORT: 5757
      ACEBASE_DB_NAME: mydb
      ACEBASE_HTTPS: "false"
      ACEBASE_USERNAME: admin
      ACEBASE_PASSWORD: 75sdDSFg37w5
      # A2A 서버 설정
      A2A_HOST: 0.0.0.0  # 모든 인터페이스에서 접근 가능
      A2A_PORT: 5000
      A2A_EXTERNAL_URL: http://localhost:5000  # A2A 서버 외부 URL (VM 환경: VM IP로 변경 필요, 예: http://34.64.202.245:5000)
      # 기타 설정
      DB_TYPE: acebase
      NAMESPACE: eventstorming_generator
      POD_ID: docker-pod
      IS_LOCAL_RUN: "true"  # Docker Compose 환경에서는 Kubernetes autoscaler 비활성화
      USE_GENERATOR_CACHE: "true"
    restart: unless-stopped
  # acebase:
  #   image: ghcr.io/msa-ez/acebase:v1.0.18 # Acebase Docker Image
  #   # image: sanghoon01/acebase:v1.1 # Acebase Docker Image
  #   container_name: acebase
  #   networks:
  #     - msaez
  #   ports:
  #     - 5757:5757
  #   volumes:
  #     - ./acebase/mydb.acebase:/acebase
  #   environment:
  #     DB_HOST: "0.0.0.0" # DB Host Name
  #     DB_NAME: mydb
  #     DB_PORT: 5757
  #     DB_HTTPS: "false"
  #     CLIENT_ID: 40850ead-6f98-4dc5-aece-8beef3f2aca9 # Client ID
  #     CLIENT_SECRET: gto_y3bwml4oj4hxtpjgb3szbfxpo5ewgdc2eisdy5pqm5i4kr2snxpa # Client Secret
  #     PROVIDER: gitea
  #     GIT: "gitea:3000" # Gitlab URL
  #     PROTOCOL: http
  gitea:
    image: gitea/gitea:1.22.3
    container_name: gitea
    networks:
      - msaez
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"
